name: CampfireLog
options:
  bundleIdPrefix: com.shimondeitel.campfirelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  CampfireLog:
    type: application
    platform: iOS
    sources:
      - path: CampfireLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.campfirelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: CampfireLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CampfireLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CampfireLogTests
      - path: CampfireLog.storekit
    dependencies:
      - target: CampfireLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.campfirelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CampfireLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CampfireLogUITests
    dependencies:
      - target: CampfireLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.campfirelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  CampfireLog:
    build:
      targets:
        CampfireLog: all
        CampfireLogTests: [test]
        CampfireLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: CampfireLog.storekit
    test:
      config: Debug
      storeKitConfiguration: CampfireLog.storekit
      targets:
        - CampfireLogTests
        - CampfireLogUITests
    archive:
      config: Release
